<!DOCTYPE html>
<!-- UNIVERSAL COMPARER — Usage: replace __CLIENTS__ with the JSON array and save as comparar.html at project root -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparer — Before vs After</title>
<style>
  :root{--bg:#0f1420;--card:#1a2130;--ink:#e8ecf4;--muted:#8a97ad;--line:#2a3346;--old:#ef4444;--new:#22c55e;--blue:#3b82f6}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;padding:20px;min-height:100vh}
  h1{font-size:22px;margin:0 0 4px}
  p.sub{color:var(--muted);margin:0 0 18px;font-size:14px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .tab{background:var(--card);border:1px solid var(--line);color:var(--ink);padding:9px 16px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
  .tab.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:900px){.cols{grid-template-columns:1fr}}
  .col{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .chead{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;font-weight:700}
  .chead .lb{display:flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%}
  .dot.o{background:var(--old)} .dot.n{background:var(--new)}
  .chead a{color:#22d3ee;text-decoration:none;font-weight:600;font-size:12px}
  .chead a:hover{text-decoration:underline}
  iframe{width:100%;height:72vh;border:0;background:#fff;display:block}
  .empty{height:72vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:20px}
  .empty strong{color:var(--old);font-size:17px}
  .hint{color:var(--muted);font-size:12px;margin-top:14px}
</style>
</head>
<body>
<h1>Before vs After</h1>
<p class="sub">Left: client's current site · Right: new version. If the old site doesn't load here (some block embedding), use the "open in new tab" link.</p>
<div class="tabs" id="tabs"></div>
<div class="cols">
  <div class="col">
    <div class="chead"><span class="lb"><span class="dot o"></span>CURRENT SITE</span><a id="oldlink" href="#" target="_blank" rel="noopener">open in new tab ↗</a></div>
    <div id="oldwrap"></div>
  </div>
  <div class="col">
    <div class="chead"><span class="lb"><span class="dot n"></span>NEW VERSION</span><a id="newlink" href="#" target="_blank" rel="noopener">open in new tab ↗</a></div>
    <div id="newwrap"></div>
  </div>
</div>
<p class="hint">Tip: to edit a page, open <b>[client]-editor.html</b> in the sites/[client]/ folder.</p>
<script>
var CLIENTS=__CLIENTS__;
var tabs=document.getElementById('tabs');
CLIENTS.forEach(function(c,i){
  var b=document.createElement('button');b.className='tab'+(i===0?' on':'');b.textContent=c.nome;
  b.onclick=function(){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});b.classList.add('on');show(c)};
  tabs.appendChild(b);
});
function show(c){
  var ow=document.getElementById('oldwrap'),nw=document.getElementById('newwrap');
  var ol=document.getElementById('oldlink'),nl=document.getElementById('newlink');
  var novo='sites/'+c.slug+'/'+c.slug+'.html';
  nw.innerHTML='<iframe src="'+novo+'"></iframe>';nl.href=novo;
  if(c.old){ow.innerHTML='<iframe src="'+c.old+'"></iframe>';ol.href=c.old;ol.style.display='inline'}
  else{ow.innerHTML='<div class="empty"><strong>No site to compare</strong><span>'+(c.motivo||'')+'</span></div>';ol.style.display='none'}
}
if(CLIENTS.length)show(CLIENTS[0]);
</script>
</body>
</html>
<!--
CLIENTS ARRAY FORMAT (JSON):
[
  {"nome":"Client Name","slug":"client-slug","old":"https://oldsite.com/"},
  {"nome":"Client Without Site","slug":"other-slug","old":null,"motivo":"Site offline"}
]
Rules: new clients ENTER the existing array (read current comparar.html and merge, never overwrite). Slug must match sites/[slug]/[slug].html folder.
-->
